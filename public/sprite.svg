  Uso:
    <svg class="pp-icon pp-icon--md" aria-hidden="true">
      <use href="/sprite.svg#icon-fontaneria"/>
    </svg>

  Helper SSR: netlify/functions/lib/icon-sprite.js
  Demo:       public/_dev/components.html

  No incluye iconos de marca (WhatsApp, LinkedIn, Instagram). Esos van como
  ficheros independientes con su brand color.
-->
