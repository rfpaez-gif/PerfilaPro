<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Acceso colaboradores — PerfilaPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/brand.css">
  <style>
    /* ── Layout específico de agente-login ─────────────────── */
    .pp-agent-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1rem;
    }

    /* ── pp-edit-card · copia local (reuso confirmado con
       editar.html; subir a components.css cuando aparezca un
       tercer caller) ────────────────────────────────────── */
    .pp-edit-card {
      width: 100%;
      max-width: 400px;
      background: var(--pp-color-surface);
      border: 1px solid var(--pp-color-border);
      border-radius: var(--pp-r-xl);
      box-shadow: var(--pp-sh-md);
      padding: clamp(1.75rem, 4vw, 2.25rem);
      text-align: center;
    }
    .pp-edit-card__title {
      font-family: var(--pp-f-display);
      font-size: clamp(1.5rem, .8rem + 1.6vw, 1.875rem);
      font-weight: 400;
      letter-spacing: var(--pp-ls-display);
      color: var(--pp-color-ink);
      margin: 0 0 .25rem;
    }
    .pp-edit-card__sub {
      color: var(--pp-color-ink-soft);
      font-size: 14px;
      margin: 0 0 var(--pp-s-6);
    }

    /* ── Mensajes ──────────────────────────────────────────── */
    .pp-msg {
      display: none;
      padding: .875rem 1rem;
      border-radius: var(--pp-r-md);
      font-size: 14px;
      margin-bottom: 1.25rem;
      line-height: 1.5;
      border: 1px solid;
      text-align: left;
    }
    .pp-msg.is-visible { display: block; }
    .pp-msg--err {
      background: rgba(178, 58, 72, 0.08);
      border-color: var(--pp-color-danger);
      color: var(--pp-color-danger);
    }

    /* ── Field overrides para alineación left dentro de la caja
       centrada ─────────────────────────────────────────── */
    .pp-agent-login .pp-field { text-align: left; }
    .pp-agent-login .pp-field__label {
      font-family: var(--pp-f-mono);
      font-size: var(--pp-fs-eyebrow);
      font-weight: 500;
      letter-spacing: var(--pp-ls-eyebrow);
      text-transform: uppercase;
      color: var(--pp-color-ink-muted);
    }
  </style>
</head>
<body>

  <main class="pp-agent-login">
    <div class="pp-edit-card">
      <h1 class="pp-edit-card__title">PerfilaPro</h1>
      <p class="pp-edit-card__sub">Portal de colaboradores</p>

      <div class="pp-msg pp-msg--err" id="errMsg" role="alert"></div>

      <div class="pp-field">
        <label class="pp-field__label" for="email">Email</label>
        <input type="email" class="pp-input" id="email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="pp-field">
        <label class="pp-field__label" for="password">Contraseña</label>
        <input type="password" class="pp-input" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="pp-btn pp-btn--primary pp-btn--lg pp-btn--block pp-btn--pill" id="loginBtn" onclick="doLogin()" style="margin-top:1.25rem">Entrar</button>
    </div>
  </main>

  <script>
    if (localStorage.getItem('pp_agent_token')) {
      location.href = '/agente.html';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      err.classList.remove('is-visible');

      if (!email || !password) {
        showErr('Introduce tu email y contraseña.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/agent-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          showErr(data.error || 'Error al iniciar sesión.');
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return;
        }
        localStorage.setItem('pp_agent_token', data.token);
        localStorage.setItem('pp_agent_name', data.agent.name);
        location.href = '/agente.html';
      } catch {
        showErr('Error de conexión. Inténtalo de nuevo.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('errMsg');
      el.textContent = msg;
      el.classList.add('is-visible');
    }
  </script>
</body>
</html>
