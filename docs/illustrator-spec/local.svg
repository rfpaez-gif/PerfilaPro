<?xml version="1.0" encoding="UTF-8"?>
<!--
  PerfilaPro · Wireframe vector 'local'
  Lienzo: 1920x960 px (entrega final 960x480 + 1920x960)
  Hueco QR (NO MOVER): x=821.76 y=223.68 w=232.32 h=232.32  (12.1% x 12.1%)
  Paleta:
    #00C277 verde-match · #00A865 verde-dark · #0A1F44 tinta
    #FAF7F0 crema       · #F7F8FA piedra      · #E5E7EB gris-200
  Esto es una guia de composicion. Sustituir por arte vectorial final
  manteniendo el rectangulo discontinuo del QR EXACTAMENTE en su sitio.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960" font-family="Inter, system-ui, sans-serif">

  <!-- Fondo blanco opaco (no transparente) -->
  <rect x="0" y="0" width="1920" height="960" fill="#FFFFFF"/>

  <!-- ── ESCAPARATE / FACHADA ─────────────────────────────────────── -->

  <!-- Banner superior (rotulo plano, sin texto) -->
  <rect x="120" y="80" width="1680" height="90" fill="#00C277"/>

  <!-- Marco lateral izquierdo del escaparate -->
  <rect x="120" y="170" width="40" height="700" fill="#FAF7F0" stroke="#0A1F44" stroke-width="3"/>
  <!-- Marco lateral derecho del escaparate -->
  <rect x="1760" y="170" width="40" height="700" fill="#FAF7F0" stroke="#0A1F44" stroke-width="3"/>
  <!-- Zocalo / base -->
  <rect x="120" y="870" width="1680" height="60" fill="#FAF7F0" stroke="#0A1F44" stroke-width="3"/>

  <!-- Cristal del escaparate (gradiente sutil para que se lea como cristal) -->
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F8FA"/>
      <stop offset="50%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#F7F8FA"/>
    </linearGradient>
  </defs>
  <rect x="160" y="170" width="1600" height="700" fill="url(#glass)" stroke="#0A1F44" stroke-width="3"/>

  <!-- Reflejos diagonales sutiles del cristal -->
  <line x1="380" y1="200" x2="220" y2="500" stroke="#FFFFFF" stroke-width="40" stroke-opacity="0.55"/>
  <line x1="1500" y1="200" x2="1300" y2="600" stroke="#FFFFFF" stroke-width="20" stroke-opacity="0.45"/>

  <!-- Hint interior: estanteria abstracta verde-light, MUY suave, sin tipificar oficio -->
  <rect x="1300" y="450" width="380" height="6" fill="#00C277" fill-opacity="0.18"/>
  <rect x="1300" y="560" width="380" height="6" fill="#00C277" fill-opacity="0.18"/>
  <rect x="1300" y="670" width="380" height="6" fill="#00C277" fill-opacity="0.18"/>
  <circle cx="1500" cy="320" r="60" fill="#00C277" fill-opacity="0.10"/>

  <!-- ── CARTEL A4 PEGADO POR DENTRO DEL CRISTAL ──────────────────── -->
  <!-- El cartel envuelve el hueco QR. Coordenadas del cartel calculadas
       para que el rectangulo discontinuo quede centrado horizontalmente
       en el cartel y haya espacio a la derecha para el copy. -->

  <!-- Cartel blanco con borde verde-match -->
  <rect x="700" y="180" width="640" height="320" fill="#FFFFFF" stroke="#00C277" stroke-width="4"/>

  <!-- ── HUECO QR · NO MOVER · CRITICAL ────────────────────────────── -->
  <!-- x=821.76 y=223.68 w=232.32 h=232.32 -->
  <rect x="821.76" y="223.68" width="232.32" height="232.32"
        fill="none" stroke="#00C277" stroke-width="6" stroke-dasharray="16 8"/>

  <!-- Anotacion del hueco (eliminar en arte final) -->
  <text x="938" y="475" font-size="14" fill="#0A1F44" fill-opacity="0.5" text-anchor="middle">
    HUECO QR · 232.32 x 232.32 · no mover
  </text>

  <!-- Copy "Escanea para abrir este perfil" (zona reservada) -->
  <text x="1080" y="290" font-size="34" font-weight="700" fill="#00C277">Escanea para</text>
  <text x="1080" y="335" font-size="34" font-weight="700" fill="#00C277">abrir este perfil</text>

  <!-- ── WORDMARK ────────────────────────────────────────────────── -->
  <text x="200" y="820" font-size="64" font-weight="700" fill="#00C277">PerfilaPro</text>

  <!-- ── ANOTACIONES (eliminar en entrega final) ──────────────────── -->
  <g font-size="13" fill="#0A1F44" fill-opacity="0.45">
    <text x="40" y="40">PerfilaPro · vector 'local' · wireframe (no es arte final)</text>
    <text x="40" y="952">Lienzo 1920x960 · entregar 960x480 PNG/WebP + 1920x960 fuente editable</text>
  </g>

  <!-- Marca de las coordenadas exactas del hueco QR (cruz fina) -->
  <line x1="821.76" y1="0" x2="821.76" y2="20" stroke="#E5484D" stroke-width="1"/>
  <line x1="1054.08" y1="0" x2="1054.08" y2="20" stroke="#E5484D" stroke-width="1"/>
  <line x1="0" y1="223.68" x2="20" y2="223.68" stroke="#E5484D" stroke-width="1"/>
  <line x1="0" y1="456" x2="20" y2="456" stroke="#E5484D" stroke-width="1"/>

</svg>
