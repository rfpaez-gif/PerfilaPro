[build]
  command        = "npm test"
  publish        = "public"
  functions      = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdfkit", "@resvg/resvg-js"]
  included_files = ["netlify/functions/lib/fonts/**"]

[functions."remind-expiry"]
  schedule = "0 9 * * *"

[functions."weekly-stats"]
  schedule = "0 9 * * 1"

[functions."purge-deleted"]
  schedule = "0 3 * * *"

# Cantera · cobra los plazos vencidos del plan de pagos a medida (Fase 3).
[functions."charge-due-enrollment-concepts"]
  schedule = "0 6 * * *"

# Producción: rama main
[context.production]
  command = "npm test"

# Vista previa de ramas (develop, feature branches)
[context.branch-deploy]
  command = "npm test"

# Vista previa de Pull Requests
[context.deploy-preview]
  command = "npm test"

# Headers de seguridad globales (auditoría de lanzamiento · S3).
# Baseline aplicada a todas las rutas: anti-clickjacking, anti-MIME-sniffing,
# control de referrer, HTTPS forzado y bloqueo de APIs del navegador no usadas.
# NOTA: no se incluye Content-Security-Policy enforcing a propósito — una CSP
# estricta rompería los scripts inline (card.js, editar.html), Stripe Checkout
# y PostHog. Añadir CSP requiere un pase de afinado por integración y se trata
# como tarea aparte (ver docs/launch-roadmap.md).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=(), payment=(self)"

# perfilapro.cat: dominio puerta de entrada para la versión catalana.
# Cualquier ruta entrante por el .cat se 301 a su equivalente bajo
# perfilapro.es/ca/* — un único canonical SEO, sin contenido duplicado.
# La raíz `/` cae a /ca/ directamente (sin pasar por la edge function de
# detección, que solo aplica a perfilapro.es).
[[redirects]]
  from   = "https://perfilapro.cat/*"
  to     = "https://perfilapro.es/ca/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.perfilapro.cat/*"
  to     = "https://perfilapro.es/ca/:splat"
  status = 301
  force  = true

# Brand kit: URL corta /brand → manual de marca completo
# (compartible con abogado, asesoría, imprenta, prensa, partners).
# El archivo real vive en /assets/brand/index.html.
[[redirects]]
  from   = "/brand"
  to     = "/assets/brand/index.html"
  status = 200

[[redirects]]
  from   = "/brand/"
  to     = "/assets/brand/index.html"
  status = 200

# Defensivo: garantiza que /assets/brand/ (con o sin slash) sirve
# el index.html aunque la pretty-URL config de Netlify no lo haga.
[[redirects]]
  from   = "/assets/brand"
  to     = "/assets/brand/index.html"
  status = 200

[[redirects]]
  from   = "/assets/brand/"
  to     = "/assets/brand/index.html"
  status = 200

