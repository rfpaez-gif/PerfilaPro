[build]
  command    = "npm test"
  publish    = "public"
  functions  = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."remind-expiry"]
  schedule = "0 9 * * *"

# Producción: rama main
[context.production]
  command = "npm test"

# Vista previa de ramas (develop, feature branches)
[context.branch-deploy]
  command = "npm test"

# Vista previa de Pull Requests
[context.deploy-preview]
  command = "npm test"

[[redirects]]
  from   = "/api/stripe-webhook"
  to     = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from   = "/api/save-card"
  to     = "/.netlify/functions/save-card"
  status = 200

[[redirects]]
  from   = "/api/create-checkout"
  to     = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from   = "/c/:slug"
  to     = "/.netlify/functions/card"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/admin-data"
  to     = "/.netlify/functions/admin-data"
  status = 200

[[redirects]]
  from   = "/api/admin-actions"
  to     = "/.netlify/functions/admin-actions"
  status = 200

[[redirects]]
  from   = "/api/legal-settings"
  to     = "/.netlify/functions/legal-settings"
  status = 200
