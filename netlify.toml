[[edge_functions]]
  path     = "/api/admin-*"
  function = "rate-limiter"

[[edge_functions]]
  path     = "/api/resend-invoice"
  function = "rate-limiter"

[[edge_functions]]
  path     = "/api/legal-settings"
  function = "rate-limiter"

# Directorio profesional — más específico primero
[[redirects]]
  from   = "/directorio/:sector/:especialidad/:ciudad"
  to     = "/.netlify/functions/dir-ciudad"
  status = 200
  force  = true

[[redirects]]
  from   = "/directorio/:sector/:especialidad"
  to     = "/.netlify/functions/dir-especialidad"
  status = 200
  force  = true

[[redirects]]
  from   = "/directorio/:sector"
  to     = "/.netlify/functions/dir-sector"
  status = 200
  force  = true

# Perfil público SEO
[[redirects]]
  from   = "/p/:slug"
  to     = "/.netlify/functions/perfil-publico"
  status = 200
  force  = true

# Sitemaps
[[redirects]]
  from   = "/sitemap.xml"
